name: Daily Scraper

on:
  schedule:
    - cron: '0 14 * * *'  # 9:00 AM America/Chicago during daylight time
    - cron: '0 15 * * *'  # 9:00 AM America/Chicago during standard time
  workflow_dispatch:      # Allows manual trigger

concurrency:
  group: scraper-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Two cron entries cover DST; only the one landing at 9 AM Chicago proceeds.
      # A step output gates the job — `exit 0` inside a step does NOT skip later steps.
      - name: Check for duplicate DST/standard cron run
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$(TZ=America/Chicago date +%H)" = "09" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping duplicate DST/standard cron run."
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.guard.outputs.go == 'true'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: Project/requirements.txt

      - name: Install dependencies
        if: steps.guard.outputs.go == 'true'
        run: |
          pip install ruff
          pip install -r Project/requirements.txt
          playwright install --with-deps chromium

      - name: Lint
        if: steps.guard.outputs.go == 'true'
        run: ruff check Project/scrape.py

      - name: Run smoke tests
        if: steps.guard.outputs.go == 'true'
        run: python -m unittest discover -s tests -p 'test_scrape_smoke.py' -v

      - name: Set up Node
        if: steps.guard.outputs.go == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - name: Run JS tests
        if: steps.guard.outputs.go == 'true'
        run: node --test tests/js/*.test.js

      - name: Run Scraper
        if: steps.guard.outputs.go == 'true'
        run: python Project/scrape.py

      - name: Commit and Push Changes
        if: steps.guard.outputs.go == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Project/scraped_events.json
          git commit -m "Update scraped events [skip ci]" || exit 0
          git pull --rebase origin main
          git push
