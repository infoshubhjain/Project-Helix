name: Daily Scraper

on:
  schedule:
    - cron: '0 14 * * *'  # 9:00 AM America/Chicago during daylight time
    - cron: '0 15 * * *'  # 9:00 AM America/Chicago during standard time
  workflow_dispatch:      # Allows manual trigger

concurrency:
  group: scraper-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: Project/requirements.txt

      - name: Install dependencies
        run: |
          pip install ruff
          pip install -r Project/requirements.txt
          playwright install --with-deps chromium

      - name: Lint
        run: ruff check Project/scrape.py

      - name: Run only at 9AM America/Chicago
        run: |
          if [ "$(TZ=America/Chicago date +%H)" != "09" ]; then
            echo "Skipping duplicate DST/standard cron run."
            exit 0
          fi

      - name: Run smoke tests
        run: python -m unittest discover -s tests -p 'test_scrape_smoke.py' -v

      - name: Run Scraper
        run: python Project/scrape.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Project/scraped_events.json
          git commit -m "Update scraped events [skip ci]" || exit 0
          git push
